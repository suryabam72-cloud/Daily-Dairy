<!DOCTYPE html>
<html>
<head>
<title>Daily Target and Achievement Form</title>
<style>
body{
font-family: Arial;
background:#f4f6f8;
padding:40px;
}

.container{
background:white;
padding:30px;
max-width:800px;
margin:auto;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h2{
text-align:center;
}

input, textarea{
width:100%;
padding:10px;
margin:6px 0 15px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
background:#2c7be5;
color:white;
padding:12px;
border:none;
border-radius:6px;
cursor:pointer;
width:100%;
font-size:16px;
}

button:hover{
background:#1a5fc1;
}
</style>
</head>

<body>

<div class="container">

<h2>Daily Target and Record of Achievement</h2>

<label>Day</label>
<input type="date">

<h3>Targets</h3>

<label>1. Most important task</label>
<textarea></textarea>

<label>2. Most important task</label>
<textarea></textarea>

<label>3. Most important task</label>
<textarea></textarea>

<h3>What do I need to do these?</h3>

<textarea placeholder="Requirement 1"></textarea>
<textarea placeholder="Requirement 2"></textarea>
<textarea placeholder="Requirement 3"></textarea>

<h3>If I cannot do these, who should I see?</h3>

<input placeholder="Person 1">
<input placeholder="Person 2">
<input placeholder="Person 3">

<h3>If I complete all tasks, how will I feel?</h3>

<textarea></textarea>
<textarea></textarea>
<textarea></textarea>

<h3>Reflection</h3>

<label>My targets for today were</label>
<textarea></textarea>
<textarea></textarea>
<textarea></textarea>

<label>Today I achieved</label>
<textarea></textarea>
<textarea></textarea>
<textarea></textarea>

<label>Targets for tomorrow</label>
<textarea></textarea>
<textarea></textarea>
<textarea></textarea>

<button type="submit">Submit</button>

</div>

</body>
</html>
